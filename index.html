<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz RACI — Toastmasters Leão do Norte</title>
<style>
  :root {
    --teal-bg: #E1F5EE;
    --teal-text: #085041;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --blue-bg: #E6F1FB;
    --blue-text: #185FA5;
    --gray-text: #5F5E5A;
    --dark-text: #2C2C2A;
    --purple-text: #3C3489;
    --border: #E0DED5;
    --bg-page: #FAF9F6;
    --bg-card: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-page);
    color: var(--dark-text);
    margin: 0;
    padding: 24px 16px 60px;
    line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .subtitle { color: var(--gray-text); font-size: 14px; margin: 0 0 20px; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--gray-text);
  }
  .legend span.swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .swatch.r { background: var(--teal-bg); border: 1px solid var(--teal-text); }
  .swatch.c { background: var(--amber-bg); border: 1px solid var(--amber-text); }
  .swatch.i { background: var(--blue-bg); border: 1px solid var(--blue-text); }

  #view-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }
  #view-tabs button {
    font-size: 14px;
    font-weight: 600;
    padding: 10px 18px;
    border: none;
    background: none;
    color: var(--gray-text);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s ease;
  }
  #view-tabs button:hover { color: var(--purple-text); }
  #view-tabs button.active {
    color: var(--purple-text);
    border-bottom-color: var(--purple-text);
  }

  #chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  #chips button {
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--dark-text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  #chips button:hover { border-color: var(--purple-text); }
  #chips button.active {
    background: var(--purple-text);
    color: #fff;
    border-color: var(--purple-text);
    font-weight: 600;
  }

  .group-title { font-size: 13px; font-weight: 600; margin: 18px 0 8px; }
  .group-title.r { color: var(--teal-text); }
  .group-title.c { color: var(--amber-text); }
  .group-title.i { color: var(--blue-text); }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .item .tag {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .item .tag.r { background: var(--teal-bg); color: var(--teal-text); }
  .item .tag.c { background: var(--amber-bg); color: var(--amber-text); }
  .item .tag.i { background: var(--blue-bg); color: var(--blue-text); }

  .empty { font-size: 14px; color: var(--gray-text); font-style: italic; }

  .section-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--purple-text);
    margin: 26px 0 12px;
  }
  .section-title:first-child { margin-top: 0; }

  .activity-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .activity-card .task {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .role-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .role-row .key {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    width: 14px;
    text-align: center;
  }
  .role-row .key.r { background: var(--teal-bg); color: var(--teal-text); }
  .role-row .key.c { background: var(--amber-bg); color: var(--amber-text); }
  .role-row .key.i { background: var(--blue-bg); color: var(--blue-text); }
  .role-row .roles { color: var(--dark-text); }
  .role-row .none { color: var(--gray-text); font-style: italic; }

  .footer-note {
    margin-top: 32px;
    font-size: 12px;
    color: var(--gray-text);
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  #search {
    width: 100%;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 18px;
    font-family: inherit;
  }
</style>
</head>
<body>

  <p class="subtitle">Guia de responsabilidades</p>

  <div class="legend">

    <div><span class="swatch c"></span>Apoia / é consultado</div>
    <div><span class="swatch i"></span>É informado</div>
  </div>

  <div id="view-tabs">
    <button id="tab-role" class="active">Por função</button>
    <button id="tab-activity">Por atividade / indicador</button>
  </div>

  <div id="role-view">
    <div id="chips"></div>
    <div id="content"></div>
  </div>

  <div id="activity-view" style="display:none;">
    <input id="search" type="text" placeholder="Buscar atividade ou indicador..." />
    <div id="activity-content"></div>
  </div>

  <div class="footer-note">
    Gerado a partir da matriz "Processos TM LdoN" (versão atualizada). Em caso de dúvida sobre alguma atribuição, confira a planilha original do clube.
  </div>
</div>

const labels = { R: "Responsável", C: "Apoia", I: "Informado" };

const chipsEl = document.getElementById("chips");
const contentEl = document.getElementById("content");
let activeRole = "Presidente";

function renderRoleView() {
  chipsEl.querySelectorAll("button").forEach(b => {
    b.classList.toggle("active", b.dataset.role === activeRole);
  });
  const rd = roleData[activeRole];
  let html = "";
  ["R","C","I"].forEach(key => {
    const items = rd[key];
    if (!items || items.length === 0) return;
    html += '<div class="group-title ' + key.toLowerCase() + '">' + labels[key] + ' (' + items.length + ')</div>';
    items.forEach(([section, task]) => {
      html += '<div class="item"><span class="tag ' + key.toLowerCase() + '">' + section + '</span><span>' + task + '</span></div>';
    });
  });
  if (!html) html = '<p class="empty">Nenhuma atribuição registrada para esta função.</p>';
  contentEl.innerHTML = html;
}

Object.keys(roleData).forEach(role => {
  const btn = document.createElement("button");
  btn.dataset.role = role;
  btn.textContent = role;
  btn.addEventListener("click", () => { activeRole = role; renderRoleView(); });
  chipsEl.appendChild(btn);
});
renderRoleView();

const activityContentEl = document.getElementById("activity-content");
const searchEl = document.getElementById("search");

function roleListHtml(key, roles) {
  const k = key.toLowerCase();
  const rolesHtml = roles.length
    ? '<span class="roles">' + roles.join(", ") + '</span>'
    : '<span class="none">—</span>';
  return '<div class="role-row"><span class="key ' + k + '">' + key + '</span>' + rolesHtml + '</div>';
}

function renderActivityView(filter) {
  const f = (filter || "").trim().toLowerCase();
  let html = "";
  Object.entries(activityData).forEach(([section, activities]) => {
    const filtered = f
      ? activities.filter(([task]) => task.toLowerCase().includes(f) || section.toLowerCase().includes(f))
      : activities;
    if (filtered.length === 0) return;
    html += '<div class="section-title">' + section + '</div>';
    filtered.forEach(([task, roles]) => {
      html += '<div class="activity-card"><div class="task">' + task + '</div>';
      html += roleListHtml("R", roles.R);
      html += roleListHtml("C", roles.C);
      html += roleListHtml("I", roles.I);
      html += '</div>';
    });
  });
  if (!html) html = '<p class="empty">Nenhuma atividade encontrada para essa busca.</p>';
  activityContentEl.innerHTML = html;
}

searchEl.addEventListener("input", (e) => renderActivityView(e.target.value));
renderActivityView("");

const tabRole = document.getElementById("tab-role");
const tabActivity = document.getElementById("tab-activity");
const roleView = document.getElementById("role-view");
const activityView = document.getElementById("activity-view");

tabRole.addEventListener("click", () => {
  tabRole.classList.add("active");
  tabActivity.classList.remove("active");
  roleView.style.display = "block";
  activityView.style.display = "none";
});
tabActivity.addEventListener("click", () => {
  tabActivity.classList.add("active");
  tabRole.classList.remove("active");
  activityView.style.display = "block";
  roleView.style.display = "none";
});
